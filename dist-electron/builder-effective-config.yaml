directories:
  output: dist-electron
  buildResources: build
appId: com.gijsbert.launch
productName: Launch
files:
  - filter:
      - electron-dist/**
      - server/dist/**
      - node_modules/**
      - package.json
      - '!node_modules/.cache'
      - '!**/*.map'
asarUnpack:
  - node_modules/node-pty/**
  - '**/*.node'
extraResources:
  - from: client/dist
    to: client
  - from: launch.config.json
    to: launch.config.json
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
npmRebuild: false
electronVersion: 33.4.11
